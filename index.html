<!DOCTYPE html>
<html>
<head>
    <title>Governance Dashboard</title>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>Fetching data from: <strong id="sheetName">Loading...</strong></p>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('sheetName').textContent = data.sheet_name;
            })
            .catch(err => {
                document.getElementById('sheetName').textContent = 'Error loading sheet';
                console.error(err);
            });
    </script>
</body>
</html>
